<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Editor Login</title>
    <link rel="stylesheet" href="/admin/static/admin.css">
  </head>
  <body class="login-page theme-burgundy-gold-cream font-source-pair">
    <main class="login-main wrap">
      <section class="login-card">
        <a class="admin-brand admin-brand-login" href="/" target="_blank" rel="noreferrer">
          <span class="brand-mark">CE</span>
          <span class="brand-copy">
            <strong>The Catholic Experiment</strong>
            <span>Project editor</span>
          </span>
        </a>
        <p class="eyebrow">Sign in</p>
        <h1>Placeholder project editor</h1>
        <p class="lead">Change text, upload artwork, and rebuild the static site.</p>
        <form method="post" action="/login" class="login-form">
          <label class="field">
            <span>Username</span>
            <input type="text" name="username" autocomplete="username" required>
          </label>
          <label class="field">
            <span>Password</span>
            <input type="password" name="password" autocomplete="current-password" required>
          </label>
          <button type="submit" class="admin-btn admin-btn-primary">Sign in</button>
        </form>
        <p class="login-error" id="loginError" hidden>Login failed. Check the configured username and password.</p>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const error = document.getElementById("loginError");
      if (params.get("error") && error) {
        if (params.get("error") === "rate") {
          error.textContent = "Too many login attempts. Wait a while and try again.";
        }
        error.hidden = false;
      }
    </script>
  </body>
</html>
